name: Flask CI

on:
  push:
    branches: [ "main" ] 
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4 

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install Pipenv
      run: pip install pipenv

    - name: Install Dependencies
      run: pipenv install --dev

    - name: Run Tests
      run: |
        pipenv run pytest -v